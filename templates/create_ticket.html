{% extends "base.html" %}
{% block title %}Neues Ticket{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Neues Ticket</h1>
    <p class="page-subtitle">Ereignis erfassen</p>
  </div>
  <a href="{{ url_for('ticket_list') }}" class="btn btn-text">
    <span class="material-symbols-outlined">arrow_back</span>Zurück
  </a>
</div>

<form method="POST" enctype="multipart/form-data">
  <div class="form-card">

    <!-- Title -->
    <div class="form-full mb-16">
      <div class="field-group">
        <label class="field-label" for="f-title">Titel *</label>
        <input class="field-input" id="f-title" name="title" required placeholder="Was ist passiert?">
      </div>
    </div>

    <div class="form-grid">
      <!-- Category -->
      <div class="field-group">
        <label class="field-label" for="category-select">Kategorie</label>
        <select class="field-select" id="category-select" name="category">
          {% for key, meta in categories.items() %}
          <option value="{{ key }}" {% if (default_cat or 'persoenlich') == key %}selected{% endif %}>{{ meta.label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Subcategory -->
      <div class="field-group">
        <label class="field-label" for="subcategory-select">Unterkategorie</label>
        <select class="field-select" id="subcategory-select" name="subcategory" disabled>
          <option value="">— Keine —</option>
        </select>
      </div>

      <!-- Priority -->
      <div class="field-group">
        <label class="field-label" for="f-priority">Priorität</label>
        <select class="field-select" id="f-priority" name="priority">
          {% for p in priorities %}
          <option value="{{ p.value }}" {% if p.value == 'mittel' %}selected{% endif %}>{{ p.label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Status -->
      <div class="field-group">
        <label class="field-label" for="f-status">Status</label>
        <select class="field-select" id="f-status" name="status">
          {% for s in statuses %}
          <option value="{{ s.value }}" {% if s.value == 'offen' %}selected{% endif %}>{{ s.label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Mood -->
      <div class="field-group">
        <label class="field-label" for="f-mood">Stimmung</label>
        <select class="field-select" id="f-mood" name="mood">
          <option value="">— Keine Angabe —</option>
          {% for m in moods %}
          <option value="{{ m.value }}">{{ m.label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Event Date -->
      <div class="field-group">
        <label class="field-label" for="event-date-input">Datum &amp; Uhrzeit</label>
        <input class="field-input" id="event-date-input" name="event_date" placeholder="Jetzt">
      </div>
    </div>

    <!-- Tags -->
    <div class="form-full mt-8">
      <div class="field-group">
        <label class="field-label" for="tags-input">Tags (kommagetrennt)</label>
        <input class="field-input" id="tags-input" name="tags" placeholder="z.B. Wichtig, Privat, ...">
      </div>
      <div class="preset-tags-row" id="preset-tags"></div>
    </div>

    <!-- Description -->
    <div class="form-full mt-16">
      <div class="field-group">
        <label class="field-label" for="f-desc">Beschreibung</label>
        <textarea class="field-textarea" id="f-desc" name="description" rows="5" placeholder="Details, Kontext, Notizen..."></textarea>
      </div>
    </div>

    <!-- Linked Tickets -->
    <div class="form-full mt-16">
      <div class="section-title">Verknüpfte Tickets</div>
      <input type="hidden" name="linked_tickets" id="linked-tickets-value">
      <div class="autocomplete-wrapper">
        <div class="field-group">
          <label class="field-label" for="linked-search-input">Ticket suchen</label>
          <input class="field-input" id="linked-search-input" placeholder="ID oder Titel eingeben">
        </div>
        <div class="autocomplete-dropdown" id="linked-dropdown"></div>
      </div>
      <div class="linked-chips mt-8" id="linked-chips"></div>
    </div>

    <!-- Attachments -->
    <div class="form-full mt-16">
      <div class="section-title">Anhänge</div>
      <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
        <button type="button" class="btn btn-tonal" onclick="document.getElementById('file-input').click()">
          <span class="material-symbols-outlined">attach_file</span>Dateien auswählen
        </button>
        <span class="text-muted" id="file-label">Keine Datei ausgewählt</span>
      </label>
      <input type="file" id="file-input" name="attachments" multiple style="display:none" onchange="updateFileLabel(this)">
    </div>

    <!-- Actions -->
    <div class="flex-gap mt-24">
      <button type="submit" class="btn btn-filled">
        <span class="material-symbols-outlined">save</span>Ticket erstellen
      </button>
      <a href="{{ url_for('ticket_list') }}" class="btn btn-text">Abbrechen</a>
    </div>

  </div>
</form>
{% endblock %}

{% block scripts %}
<script>initTicketForm(null);</script>
{% endblock %}
